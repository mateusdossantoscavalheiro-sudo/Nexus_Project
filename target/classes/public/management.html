<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - Management Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Base Dark Theme (Default) */
        :root {
            --bg-color: #0f0f0f;
            --panel-bg: #1a1a1a;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --accent-blue: #2196f3;
            --border-color: #333333;
        }

        body {
            background: var(--bg-color); color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* Top Header */
        header {
            position: absolute; top: 0; left: 0; right: 0; height: 60px;
            background: var(--panel-bg); border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
            z-index: 10;
        }

        header a { color: var(--accent-blue); text-decoration: none; font-weight: bold; }
        header a:hover { text-decoration: underline; }

        /* Layout Container */
        .app-container {
            display: flex; width: 100%; margin-top: 60px; height: calc(100vh - 60px);
        }

        /* Main Dashboard Area (CSS Grid) */
        .main-content {
            flex-grow: 1; padding: 20px; overflow-y: auto;
            display: grid;
            grid-template-columns: 2fr 1fr; /* Left side wider than right */
            grid-template-rows: auto auto 1fr;
            gap: 20px;
        }

        /* Dashboard Cards/Panels */
        .card {
            background: var(--panel-bg); border-radius: 8px; padding: 20px;
            border: 1px solid var(--border-color); box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .card h3 { margin-top: 0; color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; }

        /* specific grid placements */
        .kpi-row { grid-column: 1 / -1; display: flex; gap: 20px; }
        .kpi-box { flex: 1; background: #222; padding: 15px; border-radius: 6px; text-align: center; }
        .kpi-box span { display: block; font-size: 2rem; font-weight: bold; color: var(--accent-blue); }

        .chart-line { grid-column: 1 / 2; min-height: 300px; }
        .chart-pie { grid-column: 2 / 3; min-height: 300px; }
        .alert-table { grid-column: 1 / -1; }

        /* Right Sidebar */
        .sidebar {
            width: 280px; background: var(--panel-bg); border-left: 1px solid var(--border-color);
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
        }

        /* Buttons & Inputs */
        select, button {
            width: 100%; padding: 10px; border-radius: 4px; border: 1px solid var(--border-color);
            background: var(--bg-color); color: var(--text-main); cursor: pointer;
        }
        button:hover { background: #333; }
        .btn-logout { background: transparent; border-color: #ff5252; color: #ff5252; margin-top: auto; }
        .btn-logout:hover { background: #ff5252; color: white; }

    </style>
</head>
<body>

<header>
    <div>
        <strong style="font-size: 1.2rem;">NEXUS Project</strong> | Management Dashboard
    </div>
    <div>
        <span style="font-size: 0.85rem; color: var(--text-muted);">Developed by </span>
        <a href="https://yourportfolio.com" target="_blank">Mateus d.S Cavalheiro</a>
    </div>
</header>

<div class="app-container">
    <main class="main-content">

        <div class="kpi-row">
            <div class="kpi-box"><h3>Current Status</h3><span id="kpi-status">--</span></div>
            <div class="kpi-box"><h3>Temperature</h3><span id="kpi-temp">-- °C</span></div>
            <div class="kpi-box"><h3>Vibration</h3><span id="kpi-vib">-- mm/s</span></div>
        </div>

        <div class="card chart-line">
            <h3>Telemetry Trends</h3>
            <canvas id="trendChart"></canvas>
        </div>

        <div class="card chart-pie">
            <h3>System Availability</h3>
            <canvas id="statusChart"></canvas>
        </div>

        <div class="card alert-table">
            <h3>Recent Critical Events</h3>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Table placeholder...</p>
        </div>

    </main>

    <aside class="sidebar">
        <h3>Controls</h3>

        <label for="motorSelect" style="font-size: 0.85rem; color: var(--text-muted);">Select Asset:</label>
        <select id="motorSelect">
            <option value="1">#001 - Main Lathe CNC</option>
            <option value="2" disabled>#002 - Milling Machine (Offline)</option>
        </select>

        <button onclick="alert('Exporting to PDF...')">📄 Export to PDF</button>
        <button onclick="alert('Exporting to CSV...')">📊 Export Data (CSV)</button>
        <button onclick="alert('Toggling theme...')">🌓 Toggle Light/Dark Mode</button>

        <button class="btn-logout" onclick="location.href='index.html'">LOGOUT</button>
    </aside>
</div>

<script>
    // --- 1. Global Chart Variables ---
    let trendChart, statusChart;

    // --- 2. Initialize Charts ---
    function initCharts() {
        // Trend Chart (Line)
        const trendCtx = document.getElementById('trendChart').getContext('2d');
        trendChart = new Chart(trendCtx, {
            type: 'line',
            data: {
                labels: [], // Timestamps will go here
                datasets: [
                    { label: 'Temp (°C)', data: [], borderColor: '#ff5252', tension: 0.3 },
                    { label: 'Current (A)', data: [], borderColor: '#2196f3', tension: 0.3 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // Status Chart (Doughnut/Pie)
        const statusCtx = document.getElementById('statusChart').getContext('2d');
        statusChart = new Chart(statusCtx, {
            type: 'doughnut',
            data: {
                labels: ['OPERATING', 'STOPPED', 'LOCKED_FAILURE'],
                datasets: [{
                    data: [0, 0, 0],
                    backgroundColor: ['#2ecc71', '#f1c40f', '#ff5252']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    // --- 3. Data Processing Function ---
    async function refreshDashboard() {
        try {
            const response = await fetch('/api/history');
            const data = await response.json();

            if (data.length === 0) return;

            // Update KPI Cards with the latest record
            const latest = data[0];
            document.getElementById('kpi-status').innerText = latest.status;
            document.getElementById('kpi-temp').innerText = latest.temp + " °C";
            document.getElementById('kpi-vib').innerText = (latest.vib || "0.0") + " mm/s";

            // Color logic for status KPI
            const statusColor = latest.status === 'OPERATING' ? '#2ecc71' : (latest.status === 'LOCKED_FAILURE' ? '#ff5252' : '#f1c40f');
            document.getElementById('kpi-status').style.color = statusColor;

            // Prepare Chart Data (Inverting for chronological order)
            const history = [...data].reverse();
            const labels = history.map(item => item.time.split(' ')[1].substring(0, 5)); // HH:mm
            const temps = history.map(item => item.temp);
            const currents = history.map(item => item.curr);

            // Update Line Chart
            trendChart.data.labels = labels;
            trendChart.data.datasets[0].data = temps;
            trendChart.data.datasets[1].data = currents;
            trendChart.update();

            // Update Status Distribution (Logic to count occurrences)
            const counts = { 'OPERATING': 0, 'STOPPED': 0, 'LOCKED_FAILURE': 0 };
            data.forEach(item => counts[item.status]++);
            statusChart.data.datasets[0].data = [counts['OPERATING'], counts['STOPPED'], counts['LOCKED_FAILURE']];
            statusChart.update();

        } catch (error) {
            console.error("[NEXUS SYNC ERROR]", error);
        }
    }

    // --- 4. WebSocket for Real-time Updates ---
    const ws = new WebSocket("ws://" + window.location.host + "/ws");
    ws.onmessage = () => {
        // Every time a new MQTT message arrives, we refresh the whole dashboard
        refreshDashboard();
    };

    // --- 5. Start Everything ---
    window.onload = () => {
        initCharts();
        refreshDashboard();
    };
</script>
</body>
</html>
