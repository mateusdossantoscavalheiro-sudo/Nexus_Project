<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEXUS - Asset Management</title>
    <style>
        body { background: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 30px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 40px; }
        .badge { background: #ff9800; color: black; padding: 6px 12px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; }
        table { width: 100%; border-collapse: collapse; background: #161616; border-radius: 8px; overflow: hidden; }
        th, td { padding: 18px; text-align: left; border-bottom: 1px solid #222; }
        th { background: #1d1d1d; color: #2196f3; text-transform: uppercase; font-size: 0.85rem; }
        .status-dot { height: 10px; width: 10px; background-color: #555; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .btn-logout { background: transparent; color: #888; border: 1px solid #333; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn-logout:hover { border-color: #ff5252; color: #ff5252; }
    </style>
</head>
<body>

<header>
    <div>
        <h1 style="margin:0">System Assets</h1>
        <span class="badge">ADMINISTRATOR MODE</span>
    </div>
    <button class="btn-logout" onclick="location.href='index.html'">LOGOUT</button>
</header>

<table>
    <thead>
    <tr>
        <th>Asset ID</th>
        <th>Device Name</th>
        <th>System Status</th>
        <th>Temperature</th>
        <th>Current (A)</th>
        <th>Last Update</th>
    </tr>
    </thead>
    <tbody>
    <tr>
        <td>#001</td>
        <td>Main Lathe CNC</td>
        <td><span id="stat-text">Awaiting...</span></td>
        <td><span id="temp-val">--</span> °C</td>
        <td><span id="curr-val">--</span> A</td>
        <td><span id="time-val">--</span></td>
    </tr>
    </tbody>
</table>

<script>
    /**
     * Updates the Table UI with the complete telemetry data.
     */
    function updateFullUI(status, temp, curr, timestamp) {
        const statText = document.getElementById('stat-text');
        const tempText = document.getElementById('temp-val');
        const currText = document.getElementById('curr-val');
        const timeText = document.getElementById('time-val');

        if (statText) {
            statText.innerText = status;
            // Color logic based on status
            if (status === 'OPERATING') {
                statText.style.color = '#2ecc71';
            } else if (status === 'LOCKED_FAILURE') {
                statText.style.color = '#ff5252';
            } else {
                statText.style.color = '#f1c40f';
            }
        }

        // Updating telemetry values
        if (tempText) tempText.innerText = temp !== undefined ? temp : "--";
        if (currText) currText.innerText = curr !== undefined ? curr : "--";
        if (timeText) timeText.innerText = timestamp !== undefined ? timestamp : "--";
    }

    /**
     * Fetches the latest record from the database.
     */
    async function loadLastStatusFromDatabase() {
        try {
            const response = await fetch('/api/history');
            const historyData = await response.json();

            if (historyData.length > 0) {
                const last = historyData[0];
                // Using the keys defined in your TelemetryDAO.java
                updateFullUI(last.status, last.temp, last.curr, last.time);
            }
        } catch (error) {
            console.error("[DB ERROR] Sync failed:", error);
        }
    }

    // --- WebSocket Connection ---
    const ws = new WebSocket("ws://" + window.location.host + "/ws");

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        // Instant update from live MQTT stream
        // Note: ensuring we use the correct keys from your JSON object
        updateFullUI(data.state, data.temp, data.current, new Date().toLocaleTimeString());
    };

    // Load history when page opens
    window.onload = loadLastStatusFromDatabase;
</script>
</body>
</html>
