<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEXUS - Login</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #1e1e1e; padding: 40px; border-radius: 10px; border-top: 4px solid #2196f3; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #333; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #2196f3; border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .error { color: #f44336; font-size: 0.8rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>
<div class="login-card">
    <h2>NEXUS LOGIN</h2>
    <input type="text" id="user" placeholder="Username (admin or operator)">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="doLogin()">SIGN IN</button>
    <div id="err" class="error">Invalid credentials!</div>
</div>

<script>
    function doLogin() {
        const user = document.getElementById('user').value;
        // Simple logic for now (later we can use Java for this)
        if(user === "admin") window.location.href = "management.html";
        else if(user === "operator") window.location.href = "operation.html";
        else document.getElementById('err').style.display = "block";
    }
</script>
</body>
</html>
