<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEXUS - Industrial Dashboard</title>
    <style>
        :root {
            --bg: #0f0f0f; --card: #1a1a1a; --text: #f0f0f0;
            --green: #2ecc71; --yellow: #f1c40f; --red: #e74c3c; --blue: #3498db;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; margin: 0; }
        header { background: #000; width: 100%; padding: 20px; text-align: center; border-bottom: 3px solid var(--blue); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        .status-banner { padding: 15px 50px; border-radius: 8px; font-weight: bold; margin: 25px 0; font-size: 1.4rem; transition: 0.5s; text-transform: uppercase; }
        .OPERATING { background: var(--green); color: black; box-shadow: 0 0 15px var(--green); }
        .STOPPED { background: #444; color: #bbb; }
        .LOCKED_FAILURE { background: var(--red); color: white; animation: blink 0.8s infinite; box-shadow: 0 0 20px var(--red); }
        .MAINTENANCE { background: var(--blue); color: white; box-shadow: 0 0 15px var(--blue); }

        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; width: 90%; max-width: 1100px; }
        .card { background: var(--card); padding: 25px; border-radius: 12px; text-align: center; border: 2px solid #222; transition: 0.3s; }
        .value { font-size: 3rem; font-weight: 800; margin: 10px 0; font-family: 'Courier New', monospace; }
        .unit { font-size: 0.9rem; color: #777; letter-spacing: 1px; }

        .controls { margin-top: 40px; background: var(--card); padding: 30px; border-radius: 15px; display: flex; gap: 20px; border: 1px solid #333; }
        button { padding: 18px 35px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 1rem; text-transform: uppercase; }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.15; cursor: not-allowed; filter: grayscale(1); }

        .btn-start { background: var(--green); color: black; }
        .btn-stop { background: var(--red); color: white; }
        .btn-maint { background: var(--blue); color: white; }

        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<header>
    <h1>NEXUS PROJECT - REAL-TIME MONITORING</h1>
    <div style="margin-top: 10px; color: #555; font-size: 0.9rem;">CONNECTED TO CORE SYSTEM v1.0</div>
</header>

<div id="state-display" class="status-banner STOPPED">STATUS: OFFLINE</div>

<div class="dashboard">
    <div class="card" id="card-temp">
        <div>MOTOR TEMPERATURE</div>
        <div class="value" id="val-temp">--</div>
        <div class="unit">CELSIUS</div>
    </div>
    <div class="card" id="card-curr">
        <div>ELECTRICAL LOAD</div>
        <div class="value" id="val-curr">--</div>
        <div class="unit">AMPERES</div>
    </div>
    <div class="card" id="card-humi">
        <div>AMBIENT HUMIDITY</div>
        <div class="value" id="val-humi">--</div>
        <div class="unit">PERCENTAGE</div>
    </div>
    <div class="card" id="card-vib">
        <div>AXIAL VIBRATION</div>
        <div class="value" id="val-vib">--</div>
        <div class="unit">G-FORCE (X)</div>
    </div>
</div>

<div class="controls">
    <button class="btn-start" id="btn-start" onclick="sendCommand('START')">Start Motor</button>
    <button class="btn-stop" id="btn-stop" onclick="sendCommand('STOP')">Emergency Stop</button>
    <button class="btn-maint" id="btn-maint-in" onclick="sendCommand('MAINTENANCE_IN')">Maintenance In</button>
    <button class="btn-maint" id="btn-maint-out" onclick="sendCommand('MAINTENANCE_OUT')">Maintenance Out</button>
</div>

<script>
    // Robust WebSocket setup
    let ws;
    function connect() {
        ws = new WebSocket("ws://" + window.location.host + "/ws");

        ws.onopen = () => { console.log("WebSocket Connected to Nexus Server"); };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            // Update Sensor Displays
            document.getElementById('val-temp').innerText = data.temp.toFixed(1);
            document.getElementById('val-curr').innerText = data.curr.toFixed(1);
            document.getElementById('val-humi').innerText = data.humi.toFixed(1);
            document.getElementById('val-vib').innerText = data.vib.toFixed(2);

            // Update UI State
            const state = data.state;
            const stateDisp = document.getElementById('state-display');
            stateDisp.innerText = "STATUS: " + state;
            stateDisp.className = "status-banner " + state;

            // --- CRITICAL BUTTON LOGIC ---
            // 1. Start only allowed if STOPPED or coming out of Maintenance
            document.getElementById('btn-start').disabled = (state !== 'STOPPED');

            // 2. Stop allowed if running or in failure
            document.getElementById('btn-stop').disabled = (state !== 'OPERATING' && state !== 'LOCKED_FAILURE');

            // 3. Maintenance In only if Stopped (not running)
            document.getElementById('btn-maint-in').disabled = (state !== 'STOPPED' && state !== 'LOCKED_FAILURE');

            // 4. Maintenance Out only if already in Maintenance
            document.getElementById('btn-maint-out').disabled = (state !== 'MAINTENANCE');

            // Color Coding based on thresholds
            updateCardColor('temp', data.temp, 45, 60);
            updateCardColor('curr', data.curr, 10, 14);
            updateCardColor('vib', Math.abs(data.vib), 6, 10);
        };

        ws.onclose = () => {
            console.log("Disconnected. Retrying...");
            setTimeout(connect, 2000);
        };
    }

    function updateCardColor(id, value, warning, critical) {
        const card = document.getElementById('card-' + id);
        if (value >= critical) card.style.borderColor = 'var(--red)';
        else if (value >= warning) card.style.borderColor = 'var(--yellow)';
        else card.style.borderColor = '#333';
    }

    function sendCommand(cmd) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send("1:" + cmd);
            console.log("Command Dispatched: 1:" + cmd);
        }
    }

    connect(); // Initialize connection
</script>

</body>
</html>
