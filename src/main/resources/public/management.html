<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - Management Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* Base Dark Theme (Default) */
        :root {
            --bg-color: #0f0f0f;
            --panel-bg: #1a1a1a;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --accent-blue: #2196f3;
            --border-color: #333333;
            --accent-yellow: #ffeb3b; /* New color for Vibration */
        }

        /* Light Theme Overrides */
        body.light-mode {
            --bg-color: #f0f2f5;
            --panel-bg: #ffffff;
            --text-main: #1c1e21;
            --text-muted: #606770;
            --border-color: #ccd0d5;
        }

        /* Main Body Reset */
        body {
            background: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden; /* Prevent body from scrolling */
            transition: background 0.3s, color 0.3s;
        }

        /* GLOBAL SCROLLBAR REMOVAL */
        /* This targets all scrollable areas including main-content */
        * {
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE/Edge */
        }

        *::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }

        /* Top Header */
        header {
            position: absolute; top: 0; left: 0; right: 0; height: 60px;
            background: var(--panel-bg); border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
            z-index: 10;
        }

        header a { color: var(--accent-blue); text-decoration: none; font-weight: bold; }
        header a:hover { text-decoration: underline; }

        /* Layout Container */
        .app-container {
            display: flex; width: 100%; margin-top: 60px; height: calc(100vh - 60px);
        }

        /* Main Dashboard Area */
        .main-content {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto; /* Allow scrolling here without showing the bar */
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: auto auto 1fr;
            gap: 20px;
        }

        /* Dashboard Cards/Panels */
        .card {
            background: var(--panel-bg); border-radius: 8px; padding: 20px;
            border: 1px solid var(--border-color); box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }

        .card h3 { margin-top: 0; color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; }

        .kpi-row { grid-column: 1 / -1; display: flex; gap: 20px; }
        .kpi-box {
            flex: 1; background: var(--panel-bg); padding: 15px; border-radius: 6px;
            text-align: center; border: 1px solid var(--border-color);
        }
        .kpi-box span { display: block; font-size: 2rem; font-weight: bold; color: var(--accent-blue); }

        /* Chart Sections */
        .chart-line { grid-column: 1 / 2; min-height: 350px; }
        .chart-pie { grid-column: 2 / 3; min-height: 350px; display: flex; flex-direction: column; }
        .chart-pie-container { flex-grow: 1; position: relative; min-height: 200px; }

        /* Critical Failure Table */
        .alert-table { grid-column: 1 / -1; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; text-align: left; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; }
        th { color: var(--text-muted); font-weight: normal; }

        /* Sidebar Controls */
        .sidebar {
            width: 280px; background: var(--panel-bg); border-left: 1px solid var(--border-color);
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
        }

        /* Buttons & Inputs */
        select, button {
            width: 100%; padding: 12px; border-radius: 4px; border: 1px solid var(--border-color);
            background: var(--bg-color); color: var(--text-main); cursor: pointer; transition: 0.2s;
            font-size: 0.9rem;
        }
        button:hover { background: #333; }
        .btn-logout { background: transparent; border-color: #ff5252; color: #ff5252; margin-top: auto; font-weight: bold; }
        .btn-logout:hover { background: #ff5252; color: white; }

        /* Light Mode Overrides for boxes */
        body.light-mode .kpi-box { background: #f8f9fa; }
        body.light-mode select, body.light-mode button { background: #ffffff; color: #1c1e21; border-color: #ccd0d5; }
        body.light-mode button:hover { background: #e4e6eb; }
        body.light-mode .btn-logout:hover { background: #ff5252; color: white; }
    </style>
</head>
<body>

<header>
    <div>
        <strong style="font-size: 1.2rem;">NEXUS Project</strong> | Management Dashboard
    </div>
    <div>
        <span style="font-size: 0.85rem; color: var(--text-muted);">Developed by </span>
        <a href="https://mateusdossantoscavalheiro-sudo.github.io/Portifolio/" target="_blank">Mateus d.S Cavalheiro</a>
    </div>
</header>

<div class="app-container">
    <main class="main-content">

        <div class="kpi-row">
            <div class="kpi-box"><h3>Current Status</h3><span id="kpi-status">--</span></div>
            <div class="kpi-box"><h3>Temperature</h3><span id="kpi-temp">-- °C</span></div>
            <div class="kpi-box"><h3>Vibration</h3><span id="kpi-vib">-- mm/s</span></div>
        </div>

        <div class="card chart-line">
            <h3>Telemetry Trends</h3>
            <canvas id="trendChart"></canvas>
        </div>

        <div class="card chart-pie">
            <h3>System Availability</h3>
            <div class="chart-pie-container">
                <canvas id="statusChart"></canvas>
            </div>
        </div>

        <div class="card alert-table">
            <h3>Recent Critical Failures</h3> <table>
            <thead>
            <tr>
                <th>Time</th>
                <th>Asset ID</th>
                <th>Status</th>
                <th>Temp (°C)</th>
                <th>Current (A)</th>
                <th>Vibration (mm/s)</th>
            </tr>
            </thead>
            <tbody id="critical-events-body">
            </tbody>
        </table>
        </div>

    </main>

    <aside class="sidebar">
        <h3>Controls</h3>

        <label for="motorSelect" style="font-size: 0.85rem; color: var(--text-muted);">Select Asset:</label>
        <select id="motorSelect">
            <option value="1">#001 - Main Lathe CNC</option>
            <option value="2" disabled>#002 - Milling Machine (Offline)</option>
        </select>

        <button onclick="exportToPDF()">📄 Export to PDF</button>
        <button onclick="exportToCSV()">📊 Export Data (CSV)</button>
        <button onclick="toggleTheme()">🌓 Toggle Light/Dark Mode</button>

        <button class="btn-logout" onclick="location.href='index.html'">LOGOUT</button>
    </aside>
</div>

<script>
    // Register the DataLabels plugin for Chart.js
    Chart.register(ChartDataLabels);

    let trendChart, statusChart;

    // 1. Color mapping for status
    const getStatusColor = (status) => {
        if (status === 'OPERATING') return '#2ecc71'; // Green
        if (status === 'MAINTENANCE') return '#2196f3'; // Blue
        if (status === 'STOPPED' || status === 'LOCKED_FAILURE') return '#ff5252'; // Red
        return '#f1c40f'; // Yellow fallback
    };

    function initCharts() {
        const trendCtx = document.getElementById('trendChart').getContext('2d');
        trendChart = new Chart(trendCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'Temp (°C)', data: [], borderColor: '#ff5252', tension: 0.3, fill: false },
                    { label: 'Current (A)', data: [], borderColor: '#2196f3', tension: 0.3, fill: false },
                    { label: 'Vibration (mm/s)', data: [], borderColor: '#ffeb3b', tension: 0.4 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { datalabels: { display: false } }, // No labels on lines
                scales: {
                    y: { beginAtZero: false, grid: { color: 'rgba(128, 128, 128, 0.2)' } },
                    x: { grid: { color: 'rgba(128, 128, 128, 0.2)' } }
                }
            }
        });

        const statusCtx = document.getElementById('statusChart').getContext('2d');
        statusChart = new Chart(statusCtx, {
            type: 'doughnut',
            data: {
                labels: ['OPERATING', 'MAINTENANCE', 'STOPPED'],
                datasets: [{
                    data: [0, 0, 0],
                    backgroundColor: ['#2ecc71', '#2196f3', '#ff5252'],
                    borderWidth: 1,
                    borderColor: 'var(--panel-bg)'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: { padding: 10 },
                plugins: {
                    legend: { position: 'bottom', labels: { boxWidth: 12 } },
                    // 3. DataLabels configuration for pie chart
                    datalabels: {
                        color: '#fff',
                        font: { weight: 'bold', size: 14 },
                        formatter: (value) => { return value > 0 ? value : ''; } // Hide zero values
                    }
                }
            }
        });
    }

    async function refreshDashboard() {
        try {
            // 1. Fetch telemetry and failures in parallel for better performance
            const [historyRes, failureRes] = await Promise.all([
                fetch('/api/history'),
                fetch('/api/failures')
            ]);

            const data = await historyRes.json();
            const failures = await failureRes.json();

            if (!data || data.length === 0) return;

            // 2. Update KPI Cards (Latest real-time data)
            const latest = data[0];
            const kpiStatus = document.getElementById('kpi-status');
            kpiStatus.innerText = latest.status;
            document.getElementById('kpi-temp').innerText = (latest.temp || 0).toFixed(1) + " °C";
            document.getElementById('kpi-vib').innerText = (latest.vib || 0).toFixed(2) + " mm/s";
            kpiStatus.style.color = getStatusColor(latest.status);

            // 3. Update Telemetry Trends (Line Chart)
            const history = [...data].reverse();
            trendChart.data.labels = history.map(item => item.time.includes(' ') ? item.time.split(' ')[1].substring(0, 8) : item.time);
            trendChart.data.datasets[0].data = history.map(item => item.temp);
            trendChart.data.datasets[1].data = history.map(item => item.curr);
            trendChart.data.datasets[2].data = history.map(item => item.vib);
            trendChart.update('none');

            // 4. Update System Availability (Pie Chart)
            let opCount = 0, maintCount = 0, stopCount = 0;
            data.forEach(item => {
                if (item.status === 'OPERATING') opCount++;
                else if (item.status === 'MAINTENANCE') maintCount++;
                else if (item.status === 'STOPPED') stopCount++;
            });
            statusChart.data.datasets[0].data = [opCount, maintCount, stopCount];
            statusChart.update();

            // 5. Update Recent Critical Failures Table
            const tableBody = document.getElementById('critical-events-body');
            const selectedAsset = document.getElementById('motorSelect').value;

            const motorFailures = failures.filter(f => String(f.id) === String(selectedAsset));

            tableBody.innerHTML = '';
            if (motorFailures.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center; color: var(--text-muted);">No critical failures detected for Asset #00${selectedAsset}</td></tr>`;
            } else {
                motorFailures.forEach(event => {
                    // Now using the helper function to show Date + Time
                    const fullTime = formatNexusDate(event.time);

                    tableBody.innerHTML += `
                        <tr>
                            <td style="white-space: nowrap; min-width: 150px;">${fullTime}</td>
                            <td>#00${event.id}</td>
                            <td style="color: #ff5252; font-weight: bold;">FAILURE</td>
                            <td>${(event.temp || 0).toFixed(1)} °C</td>
                            <td>${(event.curr || 0).toFixed(2)} A</td>
                            <td>${(event.vib || 0).toFixed(2)} mm/s</td>
                        </tr>
                    `;
                });
            }

        } catch (error) {
            console.error("[NEXUS ERROR] Dashboard refresh failed:", error);
        }
    }

    async function exportToCSV() {
        try {
            const response = await fetch('/api/history');
            const data = await response.json();
            let csvRows = ["\ufeffTimestamp,Asset_ID,Status,Temp_C,Current_A,Vib_mm/s"];
            data.forEach(log => {
                csvRows.push(`"${log.time}",${log.id || '1'},${log.status},${log.temp},${log.curr},${log.vib || 0}`);
            });
            const blob = new Blob([csvRows.join("\n")], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.setAttribute("download", `NEXUS_Report_${new Date().getTime()}.csv`);
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        } catch (e) { alert("Export failed!"); }
    }

    async function exportToPDF() {
        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();
            const margin = 15;
            let currentY = 20;

            const assetSelect = document.getElementById('motorSelect');
            const assetName = assetSelect.options[assetSelect.selectedIndex].text;
            const timestamp = new Date().toLocaleString('pt-BR');

            // 1. Cabeçalho Principal
            const drawHeader = () => {
                doc.setFontSize(18);
                doc.setTextColor(33, 150, 243);
                doc.text("NEXUS - Asset Telemetry Report", margin, currentY);
                currentY += 8;
                doc.setFontSize(11);
                doc.setTextColor(100);
                doc.text(`Asset: ${assetName}`, margin, currentY);
                currentY += 6;
                doc.text(`Report Date: ${timestamp}`, margin, currentY);
                currentY += 4;
                doc.line(margin, currentY, pageWidth - margin, currentY);
                currentY += 10;
            };

            drawHeader();

            const captureSection = async (selector, title) => {
                const element = document.querySelector(selector);
                if (!element) return;

                // Configuração da captura
                const options = {
                    backgroundColor: "#1a1a1a",
                    scale: 2,
                    useCORS: true
                };

                if (selector === '.chart-line' || selector === '.alert-table') {
                    options.windowHeight = element.scrollHeight;
                    options.height = element.scrollHeight;
                }

                const canvas = await html2canvas(element, options);
                const imgData = canvas.toDataURL("image/png");
                const imgProps = doc.getImageProperties(imgData);

                let pdfWidth = pageWidth - (margin * 2);
                if (selector === '.chart-pie') pdfWidth = pdfWidth * 0.6;
                let pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;

                // --- LÓGICA DE CORREÇÃO: Check de Bloco Inteiro ---
                // Verifica se Título (6mm) + Imagem (pdfHeight) + Margem (10mm) cabem
                const estimatedBlockHeight = pdfHeight + 16;

                if (currentY + estimatedBlockHeight > pageHeight - 20) {
                    doc.addPage();
                    currentY = 20; // Reseta o Y na nova página
                }

                // Imprime o Título agora que sabemos que o bloco cabe
                doc.setFontSize(12);
                doc.setTextColor(40, 40, 40);
                doc.setFont("helvetica", "bold");
                doc.text(title, margin, currentY);
                doc.setFont("helvetica", "normal");
                currentY += 6;

                let xPos = margin;
                if (selector === '.chart-pie') xPos = (pageWidth - pdfWidth) / 2;

                doc.addImage(imgData, 'PNG', xPos, currentY, pdfWidth, pdfHeight);
                currentY += pdfHeight + 12;
            };

            // 2. Execução das Seções
            await captureSection('.kpi-row', '1 - Current Status');
            await captureSection('.chart-pie', '2 - System Availability History');
            await captureSection('.chart-line', '3 - Telemetry Trends (Complete Log)');
            await captureSection('.alert-table', '4 - Recent Critical Failures (Last Events)');

            // 3. Numeração de Páginas (Rodapé)
            const totalPages = doc.internal.getNumberOfPages();
            for (let i = 1; i <= totalPages; i++) {
                doc.setPage(i);
                doc.setFontSize(9);
                doc.setTextColor(150, 150, 150);
                doc.text(
                    `NEXUS Core System - Confidential Industrial Data - Page ${i}/${totalPages}`,
                    margin,
                    pageHeight - 10
                );
            }

            doc.save(`NEXUS_Report_${assetName.replace(/[^a-z0-9]/gi, '_')}.pdf`);
            console.log("[NEXUS] PDF Fixed and Generated!");

        } catch (error) {
            console.error("[NEXUS ERROR]", error);
            alert("Erro na exportação. Verifique o console.");
        }
    }

    // 5. Theme Toggle Logic
    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        // Update chart colors based on theme
        const isLight = document.body.classList.contains('light-mode');
        const gridColor = isLight ? 'rgba(0, 0, 0, 0.1)' : 'rgba(128, 128, 128, 0.2)';

        trendChart.options.scales.x.grid.color = gridColor;
        trendChart.options.scales.y.grid.color = gridColor;
        trendChart.update('none');

        statusChart.data.datasets[0].borderColor = isLight ? '#ffffff' : '#1a1a1a';
        statusChart.update('none');
    }

    // Helper to format PostgreSQL timestamp to "DD/MM HH:mm:ss"
    function formatNexusDate(dateStr) {
        const d = new Date(dateStr);
        const day = String(d.getDate()).padStart(2, '0');
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const year = d.getFullYear();
        const hours = String(d.getHours()).padStart(2, '0');
        const minutes = String(d.getMinutes()).padStart(2, '0');
        const seconds = String(d.getSeconds()).padStart(2, '0');

        return `${day}/${month}/${year} ${hours}:${minutes}:${seconds}`;
    }

    const ws = new WebSocket("ws://" + window.location.host + "/ws");
    ws.onmessage = () => refreshDashboard();

    window.onload = () => { initCharts(); refreshDashboard(); };
</script>
</body>
</html>
