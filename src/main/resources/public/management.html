<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEXUS - Asset Management</title>
    <style>
        body { background: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 30px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 40px; }
        .badge { background: #ff9800; color: black; padding: 6px 12px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; }
        table { width: 100%; border-collapse: collapse; background: #161616; border-radius: 8px; overflow: hidden; }
        th, td { padding: 18px; text-align: left; border-bottom: 1px solid #222; }
        th { background: #1d1d1d; color: #2196f3; text-transform: uppercase; font-size: 0.85rem; }
        .status-dot { height: 10px; width: 10px; background-color: #555; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .btn-logout { background: transparent; color: #888; border: 1px solid #333; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn-logout:hover { border-color: #ff5252; color: #ff5252; }
    </style>
</head>
<body>

<header>
    <div>
        <h1 style="margin:0">System Assets</h1>
        <span class="badge">ADMINISTRATOR MODE</span>
    </div>
    <button class="btn-logout" onclick="location.href='index.html'">LOGOUT</button>
</header>

<table>
    <thead>
    <tr>
        <th>Asset ID</th>
        <th>Device Name</th>
        <th>Industrial Zone</th>
        <th>System Status</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr>
        <td>#001</td>
        <td>Main Lathe CNC</td>
        <td>Sector A-1</td>
        <td><span class="status-dot"></span> <span id="stat-text">Awaiting Telemetry...</span></td>
        <td><button style="color:#666; background:none; border:none; cursor:not-allowed;">Decommission</button></td>
    </tr>
    </tbody>
</table>

<script>
    // Minimal logic to show connection on management screen too
    const ws = new WebSocket("ws://" + window.location.host + "/ws");
    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        const text = document.getElementById('stat-text');
        text.innerText = data.state;
        text.style.color = (data.state === 'OPERATING') ? '#2ecc71' : '#f1c40f';
    };
</script>
</body>
</html>
