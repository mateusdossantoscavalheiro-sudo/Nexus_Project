<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEXUS - Operator IHM</title>
    <style>
        /* 1. PROFESSIONAL INDUSTRIAL THEME */
        :root {
            --bg: #0f0f0f; --card: #1a1a1a; --text: #f0f0f0;
            --green: #2ecc71; --yellow: #f1c40f; --red: #e74c3c; --blue: #3498db;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; align-items: center;
            margin: 0; overflow-x: hidden;
        }

        /* 2. NAVIGATION & HEADER */
        header {
            background: #000; width: 100%; padding: 10px 30px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid var(--blue); box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .btn-logout {
            padding: 8px 20px; background: transparent; border: 1px solid var(--red);
            color: var(--red); font-size: 0.8rem; cursor: pointer; transition: 0.3s;
            border-radius: 4px; font-weight: bold;
        }
        .btn-logout:hover { background: var(--red); color: white; }

        /* 3. ASSET SELECTION AREA */
        .selection-area { margin-top: 20px; text-align: center; }
        .engine-select {
            background: #1a1a1a; color: white; border: 1px solid var(--blue);
            padding: 10px; border-radius: 5px; width: 260px; outline: none; font-weight: bold;
        }
        .engine-select:disabled { opacity: 0.5; cursor: not-allowed; border-color: #444; }

        /* 4. DYNAMIC STATUS BANNER */
        .status-banner {
            padding: 15px 50px; border-radius: 8px; font-weight: bold;
            margin: 25px 0; font-size: 1.4rem; transition: 0.5s;
            text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1);
        }
        .OPERATING { background: var(--green); color: black; box-shadow: 0 0 15px var(--green); }
        .STOPPED { background: #444; color: #bbb; }
        .LOCKED_FAILURE { background: var(--red); color: white; animation: blink 0.8s infinite; box-shadow: 0 0 20px var(--red); }
        .MAINTENANCE { background: var(--blue); color: white; box-shadow: 0 0 15px var(--blue); }

        @keyframes blink { 50% { opacity: 0.3; } }

        /* 5. TELEMETRY DASHBOARD GRID */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; width: 90%; max-width: 1100px; }
        .card { background: var(--card); padding: 25px; border-radius: 12px; text-align: center; border: 2px solid #222; transition: 0.3s; }
        .card-title { font-size: 0.8rem; color: #777; letter-spacing: 1px; margin-bottom: 10px; }
        .value { font-size: 3rem; font-weight: 800; margin: 10px 0; font-family: 'Courier New', monospace; }
        .unit { font-size: 0.9rem; color: #555; letter-spacing: 1px; }

        /* 6. INDUSTRIAL CONTROLS */
        .controls {
            margin-top: 40px; background: var(--card); padding: 30px;
            border-radius: 15px; display: flex; gap: 20px;
            border: 1px solid #333; margin-bottom: 40px;
        }
        .controls button {
            padding: 18px 35px; border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold; transition: 0.2s;
            font-size: 1rem; text-transform: uppercase;
        }
        .controls button:active { transform: scale(0.95); }
        .controls button:disabled { opacity: 0.15; cursor: not-allowed; filter: grayscale(1); }

        .btn-start { background: var(--green); color: black; }
        .btn-stop { background: var(--red); color: white; }
        .btn-maint { background: var(--blue); color: white; }
    </style>
</head>
<body>

<header>
    <div style="text-align: left;">
        <h1 style="margin: 0; font-size: 1.5rem; letter-spacing: 1px;">NEXUS INDUSTRIAL | <span style="color: var(--blue);">IHM OPERADOR</span></h1>
        <div style="color: #555; font-size: 0.8rem;">CORE SYSTEM v1.1 - ENHANCED SECURITY</div>
    </div>
    <button class="btn-logout" onclick="doLogout()">LOGOUT</button>
</header>

<div class="selection-area">
    <label style="font-size: 0.8rem; color: #777; display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;">Active Machine Selection</label>
    <select id="asset-select" class="engine-select" onchange="updateSelectedAsset()">
    </select>
</div>

<div id="state-display" class="status-banner STOPPED">STATUS: DISCONNECTED</div>

<div class="dashboard">
    <div class="card" id="card-temp">
        <div class="card-title">MOTOR TEMPERATURE</div>
        <div class="value" id="val-temp">--</div>
        <div class="unit">CELSIUS</div>
    </div>
    <div class="card" id="card-curr">
        <div class="card-title">ELECTRICAL LOAD</div>
        <div class="value" id="val-curr">--</div>
        <div class="unit">AMPERES</div>
    </div>
    <div class="card" id="card-humi">
        <div class="card-title">AMBIENT HUMIDITY</div>
        <div class="value" id="val-humi">--</div>
        <div class="unit">PERCENTAGE</div>
    </div>
    <div class="card" id="card-vib">
        <div class="card-title">AXIAL VIBRATION</div>
        <div class="value" id="val-vib">--</div>
        <div class="unit">mm/s (X)</div>
    </div>
</div>

<div class="controls">
    <button class="btn-start" id="btn-start" onclick="sendCommand('START')">Start Motor</button>
    <button class="btn-stop" id="btn-stop" onclick="sendCommand('STOP')">Emergency Stop</button>
    <button class="btn-maint" id="btn-maint" onclick="sendCommand('MAINTENANCE')">Maintenance</button>
</div>

<script>
    // Global connection state
    let ws;
    let currentAssetId = null;

    /**
     * INITIALIZATION
     * Syncs the machine inventory and establishes the telemetry link.
     */
    window.onload = async () => {
        await syncAssetList();

        // Add event listener to the dropdown to trigger context switch
        document.getElementById('asset-select').addEventListener('change', updateSelectedAsset);

        connectWebSocket();
    };

    /**
     * ASSET SYNCHRONIZATION
     * Pulls the fleet list from the Java API to ensure IDs match the database.
     */
    async function syncAssetList() {
        try {
            const response = await fetch('/api/assets');
            if (!response.ok) throw new Error("Backend unreachable");

            const assets = await response.json();
            const selectEl = document.getElementById('asset-select');
            selectEl.innerHTML = '';

            assets.forEach(asset => {
                let opt = document.createElement('option');
                opt.value = asset.id;
                opt.innerHTML = `[ID:00${asset.id}] - ${asset.name}`;
                selectEl.appendChild(opt);
            });

            // Auto-select the first asset if none is active
            if (assets.length > 0 && currentAssetId === null) {
                currentAssetId = assets[0].id;
                // Notify backend of the initial selected ID
                setTimeout(() => notifyBackendContextSwitch(), 1000);
            }
        } catch (error) {
            console.error("[NEXUS] CONFIG ERROR:", error);
            document.getElementById('state-display').innerText = "CONFIG ERROR: NO API ACCESS";
        }
    }

    /**
     * CONTEXT SWITCHING
     * Clears UI data and notifies the Java/ESP32 layer of the new target ID.
     */
    function updateSelectedAsset() {
        currentAssetId = document.getElementById('asset-select').value;
        console.log("[NEXUS] Switching operator context to Asset ID:", currentAssetId);

        // Reset display values to prevent "ghost" readings from the previous asset
        document.getElementById('val-temp').innerText = "--";
        document.getElementById('val-curr').innerText = "--";
        document.getElementById('val-humi').innerText = "--";
        document.getElementById('val-vib').innerText = "--";

        // Dispatch command to change the simulated hardware ID
        notifyBackendContextSwitch();
    }

    function notifyBackendContextSwitch() {
        if (ws && ws.readyState === WebSocket.OPEN && currentAssetId) {
            ws.send(`SWITCH_ID:${currentAssetId}`);
            console.log("[NEXUS] Instructed hardware to simulate Asset ID:", currentAssetId);
        }
    }

    /**
     * REAL-TIME TELEMETRY LINK
     * Connects via WebSocket for sub-second updates from the ESP32/Java bridge.
     */
    function connectWebSocket() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            // DATA SEGREGATION: Only process data for the machine currently on-screen
            if (String(data.id) !== String(currentAssetId)) return;

            // 1. Update Numeric Values
            document.getElementById('val-temp').innerText = data.temp.toFixed(1);
            document.getElementById('val-curr').innerText = data.curr.toFixed(2);
            document.getElementById('val-humi').innerText = data.humi.toFixed(0);
            document.getElementById('val-vib').innerText = data.vib.toFixed(2);

            // 2. Update Status Banner
            const banner = document.getElementById('state-display');
            banner.innerText = "STATUS: " + data.state;
            banner.className = "status-banner " + data.state;

            // 3. Safety Lock Management (NEW LOGIC)
            const assetSelect = document.getElementById('asset-select');
            const startBtn = document.getElementById('btn-start');

            if (data.state === 'LOCKED_FAILURE') {
                assetSelect.disabled = true; // Block switching during critical failure
                startBtn.disabled = true;    // Prevent starting a broken machine
            } else if (data.state === 'OPERATING') {
                assetSelect.disabled = true; // NEW: Cannot switch machines while running
                startBtn.disabled = true;    // Already running
            } else {
                // State is STOPPED or IDLE
                assetSelect.disabled = false;
                startBtn.disabled = false;
            }

            // 4. Dynamic Visual Alerting
            updateCardBorder('temp', data.temp, 45, data.limitTemp || 60);
            updateCardBorder('curr', data.curr, 10, 14);
            updateCardBorder('vib', Math.abs(data.vib), 6, 10);
        };

        ws.onclose = () => {
            console.warn("[NEXUS] WebSocket link lost. Reconnecting...");
            setTimeout(connectWebSocket, 2000);
        };
    }

    /**
     * CARD HIGHLIGHTING
     */
    function updateCardBorder(id, value, warning, critical) {
        const card = document.getElementById('card-' + id);
        if (value >= critical) card.style.borderColor = 'var(--red)';
        else if (value >= warning) card.style.borderColor = 'var(--yellow)';
        else card.style.borderColor = '#222';
    }

    /**
     * COMMAND TRANSMISSION
     */
    function sendCommand(cmd) {
        if (ws && ws.readyState === WebSocket.OPEN && currentAssetId) {
            const payload = `${currentAssetId}:${cmd}`;
            ws.send(payload);
            console.log("[NEXUS] Command Sent:", payload);
        } else {
            alert("Error: No connection to Command Server.");
        }
    }

    function doLogout() {
        window.location.href = 'index.html';
    }
</script>

</body>
</html>
